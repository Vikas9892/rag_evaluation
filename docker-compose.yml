version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rag-evaluation-api:latest
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      # Copy your Groq key into a local .env file — never commit it
      GROQ_API_KEY: "${GROQ_API_KEY}"
      LOG_LEVEL: "INFO"
    volumes:
      # Mount pre-built FAISS index and metadata from the host
      - ./index:/app/index:ro
      # Persist logs outside the container
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
